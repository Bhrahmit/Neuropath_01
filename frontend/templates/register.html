<!DOCTYPE html>
<!--
  CareerAI - Register Page (register.html)
  ==========================================
  New user registration for students and recruiters.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — CareerAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="auth-body">

<div class="auth-bg"></div>

<div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
  <div class="row w-100 justify-content-center">
    <div class="col-md-6 col-lg-5">

      <div class="text-center mb-4">
        <a href="/" class="text-decoration-none">
          <span class="fs-2 fw-bold">🧠 Career<span class="text-gradient">AI</span></span>
        </a>
        <p class="text-muted mt-2">Create your free account and start your journey</p>
      </div>

      <div class="auth-card">
        <h4 class="fw-semibold mb-4 text-center">Create Account</h4>

        <!-- Role Toggle -->
        <div class="role-toggle mb-4">
          <button class="role-btn active" id="role-student" onclick="setRole('student')">
            <i class="bi bi-mortarboard me-2"></i>Student
          </button>
          <button class="role-btn" id="role-recruiter" onclick="setRole('recruiter')">
            <i class="bi bi-briefcase me-2"></i>Recruiter
          </button>
        </div>

        <div id="alert-container"></div>

        <form id="register-form">
          <input type="hidden" id="role" value="student">

          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-end-0">
                <i class="bi bi-person text-muted"></i>
              </span>
              <input type="text" class="form-control border-start-0 ps-0" id="name"
                placeholder="Your full name" required minlength="2">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-end-0">
                <i class="bi bi-envelope text-muted"></i>
              </span>
              <input type="email" class="form-control border-start-0 ps-0" id="email"
                placeholder="you@example.com" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-end-0">
                <i class="bi bi-lock text-muted"></i>
              </span>
              <input type="password" class="form-control border-start-0 ps-0" id="password"
                placeholder="Min 6 characters" required minlength="6">
              <button type="button" class="input-group-text bg-transparent" id="toggle-pass">
                <i class="bi bi-eye text-muted" id="eye-icon"></i>
              </button>
            </div>
            <div class="password-strength mt-2" id="password-strength"></div>
          </div>

          <div class="mb-4">
            <label class="form-label">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-end-0">
                <i class="bi bi-shield-lock text-muted"></i>
              </span>
              <input type="password" class="form-control border-start-0 ps-0" id="confirm-password"
                placeholder="Repeat password" required>
            </div>
          </div>

          <div class="form-check mb-3">
            <input type="checkbox" class="form-check-input" id="terms" required>
            <label class="form-check-label small" for="terms">
              I agree to the <a href="#" class="text-primary">Terms</a> and <a href="#" class="text-primary">Privacy Policy</a>
            </label>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2" id="register-btn">
            <span class="btn-text">Create Account</span>
            <span class="btn-spinner spinner-border spinner-border-sm ms-2 d-none"></span>
          </button>
        </form>

        <p class="text-center mt-4 mb-0 small">
          Already have an account? <a href="/login" class="text-primary fw-semibold">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
<script>
  const API = window.API_BASE || '';
  let selectedRole = 'student';

  // Pre-fill role from URL param
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('role') === 'recruiter') setRole('recruiter');

  function setRole(role) {
    selectedRole = role;
    document.getElementById('role').value = role;
    document.getElementById('role-student').classList.toggle('active', role === 'student');
    document.getElementById('role-recruiter').classList.toggle('active', role === 'recruiter');
  }

  // Toggle password
  document.getElementById('toggle-pass').addEventListener('click', () => {
    const input = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    input.type = input.type === 'password' ? 'text' : 'password';
    icon.className = input.type === 'password' ? 'bi bi-eye text-muted' : 'bi bi-eye-slash text-muted';
  });

  // Password strength indicator
  document.getElementById('password').addEventListener('input', function() {
    const pw = this.value;
    const container = document.getElementById('password-strength');
    let strength = 0;
    if (pw.length >= 6) strength++;
    if (pw.length >= 10) strength++;
    if (/[A-Z]/.test(pw)) strength++;
    if (/[0-9]/.test(pw)) strength++;
    if (/[^A-Za-z0-9]/.test(pw)) strength++;

    const levels = ['', 'Very Weak', 'Weak', 'Fair', 'Strong', 'Very Strong'];
    const colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e', '#16a34a'];
    container.innerHTML = pw ? `
      <div class="d-flex align-items-center gap-2">
        <div class="strength-bars d-flex gap-1">
          ${[1,2,3,4,5].map(i => `<div class="strength-bar ${i <= strength ? 'filled' : ''}" style="${i <= strength ? `background:${colors[strength]}` : ''}"></div>`).join('')}
        </div>
        <small style="color:${colors[strength]}">${levels[strength]}</small>
      </div>` : '';
  });

  // Form submit
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;

    if (password !== confirm) {
      return showAlert('Passwords do not match', 'danger');
    }

    const btn = document.getElementById('register-btn');
    const spinner = btn.querySelector('.btn-spinner');
    btn.disabled = true;
    spinner.classList.remove('d-none');
    btn.querySelector('.btn-text').textContent = 'Creating account...';

    try {
      const res = await fetch(`${API}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: password,
          role: selectedRole
        })
      });

      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('careerai_token', data.access_token);
        localStorage.setItem('careerai_user', JSON.stringify(data.user));
        showAlert('Account created! Taking you to dashboard...', 'success');
        setTimeout(() => {
          window.location.href = selectedRole === 'recruiter' ? '/recruiter' : '/dashboard';
        }, 1000);
      } else {
        showAlert(data.detail || 'Registration failed. Try again.', 'danger');
      }
    } catch (err) {
      showAlert('Connection error. Make sure the server is running.', 'danger');
    } finally {
      btn.disabled = false;
      spinner.classList.add('d-none');
      btn.querySelector('.btn-text').textContent = 'Create Account';
    }
  });

  function showAlert(msg, type) {
    document.getElementById('alert-container').innerHTML = `
      <div class="alert alert-${type} alert-dismissible fade show py-2" role="alert">
        ${msg}
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
      </div>`;
  }
</script>
</body>
</html>
